<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        position: 0;
      }
      body {
        height: 1000vh;
        background-color: white;
      }
      .con {
        display: flex;
        width: 100%;
        height: 60px;
        border: none;
        position: fixed;
        border-radius: 0.3rem;
        background-color: aliceblue;
      }
      h4 {
        margin: 17px 0 17px 17px;
        font-family: "Anton", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      h5 {
        margin: 17px 10px;
        font-size: 1rem;
        font-family: "Anton", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      #butt {
        background-color: rgb(4, 175, 4);
        border: none;
        width: 100px;
        height: 40px;
        margin: 9px;
        border-radius: 10px;
        color: white;
        font-size: 1rem;
      }
      .left {
        display: flex;
        margin: 0 1rem;
      }
      .right {
        display: flex;
        margin-left: 5rem;
      }
      #sear {
        display: flex;
        margin: 10px;
        border-radius: 17px;
        border: 1px solid black;
        width: 180px;
        height: 35px;
      }
      .searc {
        border: none;
        margin: 4px;
        font-size: 1rem;
        width: 130px;
      }
      #one {
        margin: 15px 15px 15px 0;
        size: 8px;
      }
      span {
        margin-top: 0.5rem;
      }
      #arr {
        margin-top: 15px;
      }
      img {
        margin: 7px;
        width: 40px;
        height: 40px;
      }
      .contwo {
        display: flex;
      }
      .secon {
        display: flex;
        width: 100%;
        height: 14vh;
        border: 1px solid black;
        position: fixed;
        color: white;
      }
      #three {
        background-color: black;
        margin-top: 60px;

        display: flex;
        width: 100%;
        height: 1.9rem;
      }
      button {
        margin-top: 0.2rem;
        background-color: black;
        color: white;
        border: none;
        padding-left: 1.2rem;
        padding-right: 1.2rem;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@0,100..900;1,100..900&family=Anton&family=Bitcount+Grid+Double+Ink:wght@100..900&family=Bungee&family=Datatype:wght@100..900&family=Doto:wght@100..900&family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Kranky&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Outfit:wght@100..900&family=Pacifico&family=Press+Start+2P&family=Rubik:ital,wght@0,300..900;1,300..900&family=Smooch+Sans:wght@100..900&family=Yatra+One&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="con">
      <img
        src="https://www.skillfinder.com.au/media/wysiwyg/W3.png"
        alt="Logo"
      />
      <div class="left">
        <h4>Tutorials</h4>
        <span class="material-symbols-outlined" id="arr">
          arrow_drop_down
        </span>
        <h4>Reference</h4>
        <span class="material-symbols-outlined" id="arr">
          arrow_drop_down
        </span>
        <h4>Exercise</h4>
        <span class="material-symbols-outlined" id="arr">
          arrow_drop_down
        </span>
        <h4>Certificates</h4>
        <span class="material-symbols-outlined" id="arr">
          arrow_drop_down
        </span>
      </div>
      <div id="sear">
        <input type="text" placeholder="Search..." class="searc" />
        <span class="material-symbols-outlined"> search </span>
      </div>
      <span class="material-symbols-outlined" id="one"> more_vert </span>

      <div class="right">
        <h5>Bootcamps</h5>
        <h5>Spaces</h5>
        <h5>Teachers</h5>
        <h5>Ugrade</h5>
        <h5>Get Certified</h5>
      </div>
      <button id="butt">Sign in</button>
    </div>
    <div class="contwo">
      <div class="secon">
        <div id="three">
          <button style="background-color: green">HTML</button>
          <button>CSS</button>
          <button>JavaScript</button>
          <button>SQL</button>
          <button>PYTHON</button>
          <button>JAVA</button>
          <button>C++</button>
          <button>PHP</button>
          <button>HOW TO</button>
          <button>W3.CSS</button>
          <button>C</button>
          <button>C#</button>
          <button>BOOTSTRAP</button>
          <button>MYSQL</button>
          <button>XML</button>
          <button>REACT</button>
          <button>PANDAS</button>
        </div>
      </div>
    </div>
  </body>
</html>
